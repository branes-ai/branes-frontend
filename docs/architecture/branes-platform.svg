<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Human Architect -->
  <rect x="300" y="10" width="200" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="40" text-anchor="middle" font-size="14" fill="#1e40af" font-weight="600">Human Architect</text>

  <!-- Arrow down -->
  <line x1="400" y1="60" x2="400" y2="90" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Frontend -->
  <rect x="250" y="90" width="300" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="600">Branes Frontend (React)</text>
  <text x="400" y="136" text-anchor="middle" font-size="11" fill="#6b7280">Port 3000 — Visualization Dashboard</text>

  <!-- Arrow down -->
  <line x1="400" y1="150" x2="400" y2="180" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="415" y="172" font-size="10" fill="#9ca3af">REST / SSE</text>

  <!-- Backend -->
  <rect x="250" y="180" width="300" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">Branes API Server (FastAPI)</text>
  <text x="400" y="226" text-anchor="middle" font-size="11" fill="#6b7280">Port 8000 — Read-only Data Access</text>

  <!-- Arrow down -->
  <line x1="400" y1="240" x2="400" y2="270" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="415" y="262" font-size="10" fill="#9ca3af">reads JSON</text>

  <!-- Session Store -->
  <rect x="275" y="270" width="250" height="50" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="298" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">Session Store</text>
  <text x="400" y="312" text-anchor="middle" font-size="10" fill="#9ca3af">~/.embodied-ai/sessions/</text>

  <!-- CLI / LangGraph on the left -->
  <rect x="30" y="180" width="180" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="208" text-anchor="middle" font-size="13" fill="#166534" font-weight="600">CLI / LangGraph</text>
  <text x="120" y="226" text-anchor="middle" font-size="11" fill="#6b7280">Design Pipeline</text>

  <!-- Arrow from CLI to Session Store -->
  <line x1="120" y1="240" x2="120" y2="295" stroke="#9ca3af" stroke-width="2"/>
  <line x1="120" y1="295" x2="275" y2="295" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="288" font-size="10" fill="#9ca3af">auto-saves</text>

  <!-- Visualization libraries on the right -->
  <rect x="600" y="90" width="170" height="150" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="685" y="112" text-anchor="middle" font-size="12" fill="#6d28d9" font-weight="600">Viz Libraries</text>
  <text x="685" y="132" text-anchor="middle" font-size="11" fill="#6b7280">Plotly.js (3D)</text>
  <text x="685" y="150" text-anchor="middle" font-size="11" fill="#6b7280">ECharts (radar)</text>
  <text x="685" y="168" text-anchor="middle" font-size="11" fill="#6b7280">Cytoscape (DAG)</text>
  <text x="685" y="186" text-anchor="middle" font-size="11" fill="#6b7280">Recharts (lines)</text>

  <!-- Arrow from frontend to viz -->
  <line x1="550" y1="120" x2="600" y2="120" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>

  <!-- Agent blocks at bottom -->
  <rect x="80" y="370" width="140" height="45" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="150" y="395" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="500">Workload Analyzer</text>

  <rect x="240" y="370" width="140" height="45" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="310" y="395" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="500">PPA Evaluator</text>

  <rect x="400" y="370" width="140" height="45" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="470" y="395" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="500">Optimizer</text>

  <rect x="560" y="370" width="140" height="45" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="630" y="395" text-anchor="middle" font-size="11" fill="#0369a1" font-weight="500">Report Generator</text>

  <!-- Arrow from CLI down to agents -->
  <line x1="120" y1="240" x2="120" y2="350" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="120" y1="350" x2="630" y2="350" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="150" y1="350" x2="150" y2="370" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="310" y1="350" x2="310" y2="370" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="470" y1="350" x2="470" y2="370" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="630" y1="350" x2="630" y2="370" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Labels -->
  <text x="400" y="460" text-anchor="middle" font-size="12" fill="#6b7280">LangGraph Specialist Agents</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
